name: CISOAlert
options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: 2G875YX5NV
targets:
  CISOAlert:
    type: application
    platform: iOS
    sources:
      - path: CISOAlert
    info:
      path: CISOAlert/Info.plist
      properties:
        CFBundleDisplayName: CISO Alert
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.transilience.cisoalert
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: CISOAlert/CISOAlert.entitlements
  CISOAlertTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CISOAlertTests
    dependencies:
      - target: CISOAlert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.transilience.cisoalert.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CISOAlert:
    build:
      targets:
        CISOAlert: all
        CISOAlertTests: [test]
    test:
      targets: [CISOAlertTests]
