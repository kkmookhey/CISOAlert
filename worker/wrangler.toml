name = "cisoalert"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "cisoalert"
database_id = "5c97c52e-4865-4353-aff6-960dfef0dae3"

[vars]
APNS_TOPIC = "ai.transilience.cisoalert"
APNS_KEY_ID = "8AJ3RT8CCA"
APNS_TEAM_ID = "2G875YX5NV"
CLAUDE_MODEL = "claude-sonnet-4-6"
# Claim-binding: "observe" logs ungrounded threats but keeps them (demoted); flip to
# "enforce" to drop ungrounded threats once the false-drop rate looks safe.
GROUNDING_MODE = "observe"
# Secrets (wrangler secret put): ANTHROPIC_API_KEY, NVD_API_KEY, APNS_KEY_P8, ADMIN_TOKEN
